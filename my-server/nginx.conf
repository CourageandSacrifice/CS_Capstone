# nginx config for campusclash.duckdns.org
# Place at: /etc/nginx/conf.d/campusclash.conf
#
# Requires a valid SSL cert — get one with:
#   sudo certbot --nginx -d campusclash.duckdns.org
#
# After placing this file:
#   sudo nginx -t && sudo systemctl reload nginx

# Properly set Connection header: "upgrade" for WebSocket, "close" for plain HTTP
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name campusclash.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name campusclash.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/campusclash.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campusclash.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:2567;
        proxy_http_version 1.1;

        # Conditionally upgrade for WebSocket; plain HTTP gets Connection: close
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
